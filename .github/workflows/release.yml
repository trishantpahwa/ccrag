name: Release

# Publishes ccrag to PyPI when a GitHub Release is published.
#
# Authentication: a PyPI API token stored as a repository secret named
# PYPI_API_TOKEN (Settings → Secrets and variables → Actions → New repository
# secret). The workflow never sees the raw token — it is injected at runtime.
#
# To cut a release: bump `version` in pyproject.toml, tag it `vX.Y.Z`, and publish
# a GitHub Release for that tag. The tag must match the pyproject version.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject version: $PKG_VERSION | git tag: $GITHUB_REF_NAME"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match pyproject version '$PKG_VERSION'."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Validate distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Username is implicitly __token__ when a token password is supplied.
          password: ${{ secrets.PYPI_API_TOKEN }}

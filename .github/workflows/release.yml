name: Release

# Publishes ccrag to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets required.
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   * PyPI Project Name: ccrag
#   * Owner:             trishantpahwa
#   * Repository name:   ccrag
#   * Workflow name:     release.yml
#   * Environment name:  pypi
# Then create a matching GitHub Environment named "pypi" (Settings → Environments).
#
# To cut a release: bump `version` in pyproject.toml, tag it `vX.Y.Z`, and publish
# a GitHub Release for that tag. The tag must match the pyproject version.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject version: $PKG_VERSION | git tag: $GITHUB_REF_NAME"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match pyproject version '$PKG_VERSION'."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Validate distribution metadata
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ccrag
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
